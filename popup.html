<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NotebookLM Folders Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <span class="logo-icon">📔</span>
      <h1 class="logo-title">Folders for NotebookLM</h1>
    </header>

    <main class="popup-main">
      <div class="stats-section">
        <h2 class="section-title">Workspace Stats</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="stat-folders">0</span>
            <span class="stat-label">Folders</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-notebooks">0</span>
            <span class="stat-label">Organized</span>
          </div>
        </div>
      </div>

      <div class="action-section">
        <h2 class="section-title">Backup & Portability</h2>
        <p class="section-desc">Keep your organization safe or transfer it to another browser.</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="export-btn">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            Export Backup
          </button>
          <button class="btn btn-secondary" id="import-btn">
            <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM12 9l5 5h-3v4h-4v-4H7l5-5z"/></svg>
            Import Backup
          </button>
        </div>
        <input type="file" id="file-input" accept=".json" style="display: none;">
      </div>
    </main>

    <footer class="popup-footer">
      <p class="footer-text">100% Private & Local Storage</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
